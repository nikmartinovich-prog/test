<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ЖиЖе — жизнь и животные Елизаветы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --neva:#0d1830;
  --night:#16233f;
  --sil:#0b1526;
  --granite:#5d6c83;
  --pearl:#f2efe7;
  --dawn:#f0b795;
  --rose:#c98ea4;
  --brass:#e0b25f;
  --brass-dim:#8d6f38;
  --lift:0deg;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--neva);
  color:var(--pearl);
  font-family:"Manrope",-apple-system,"Segoe UI",Roboto,sans-serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ---------- сцена ---------- */
.scene{position:fixed;inset:0;z-index:0;overflow:hidden}
.sky{
  position:absolute;inset:0;
  background:
    radial-gradient(120% 70% at 62% 96%, rgba(240,183,149,.55) 0%, rgba(201,142,164,.28) 34%, rgba(0,0,0,0) 66%),
    linear-gradient(180deg,#0a1128 0%,#16233f 42%,#3b3f68 72%,#7d6a86 88%,#c99a92 100%);
  animation:breathe 24s ease-in-out infinite alternate;
}
@keyframes breathe{from{filter:saturate(1) brightness(1)}to{filter:saturate(1.14) brightness(1.07)}}
.stars{position:absolute;inset:0 0 45% 0;opacity:.55}
.stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.7;animation:tw 4s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.85}}
.cloud{
  position:absolute;border-radius:50%;
  background:linear-gradient(90deg,rgba(255,214,196,0),rgba(255,214,196,.30),rgba(255,214,196,0));
  filter:blur(14px);
  animation:drift linear infinite;
}
@keyframes drift{from{transform:translateX(-30vw)}to{transform:translateX(130vw)}}
.gull{position:absolute;color:rgba(242,239,231,.5);animation:fly linear infinite}
@keyframes fly{
  from{transform:translateX(-12vw) translateY(0)}
  50%{transform:translateX(55vw) translateY(-22px)}
  to{transform:translateX(118vw) translateY(6px)}
}
.city{position:absolute;left:0;right:0;bottom:0;width:100%;height:62vh;min-height:340px}
.sil{fill:var(--sil)}
.granite{fill:#101d33}
.win{fill:#ffcf8a;animation:glow 6s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.35}50%{opacity:.95}}
.leaf{transform-box:fill-box;transition:transform 1.6s cubic-bezier(.32,.9,.26,1)}
.leaf-l{transform-origin:0% 60%;transform:rotate(calc(var(--lift) * -1))}
.leaf-r{transform-origin:100% 60%;transform:rotate(var(--lift))}
.shimmer line{stroke:rgba(226,205,178,.30);stroke-width:2;stroke-linecap:round;animation:shim 7s ease-in-out infinite}
@keyframes shim{0%,100%{transform:translateX(0);opacity:.25}50%{transform:translateX(26px);opacity:.7}}
.lampglow{fill:var(--brass);opacity:.9;animation:glow 5s ease-in-out infinite}

/* ---------- сцена: содержимое ---------- */
.stage{
  position:relative;z-index:2;
  min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:28px 18px 44px;
}
.panel{display:none;width:100%;max-width:560px}
.panel.on{display:block;animation:rise .55s cubic-bezier(.2,.8,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

.card{
  background:linear-gradient(180deg,rgba(13,24,48,.86),rgba(9,17,35,.92));
  border:1px solid rgba(224,178,95,.30);
  border-radius:22px;
  padding:26px 22px 22px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 28px 70px rgba(0,0,0,.55);
}

/* заставка */
.mark{
  font-family:"Yeseva One",Georgia,serif;
  font-size:clamp(56px,17vw,104px);
  line-height:.92;letter-spacing:-.02em;
  margin:0;
  background:linear-gradient(175deg,#fff6e2 10%,var(--brass) 62%,#a97f2f 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 1px 0 rgba(0,0,0,.2);
}
.sub{
  font-family:"JetBrains Mono",ui-monospace,monospace;
  font-size:11px;letter-spacing:.30em;text-transform:uppercase;
  color:rgba(242,239,231,.72);margin:14px 0 0;
}
.rule{height:1px;background:linear-gradient(90deg,transparent,rgba(224,178,95,.55),transparent);margin:22px 0}
.lede{margin:0 0 24px;color:rgba(242,239,231,.80);font-size:15px;line-height:1.6}

.btn{
  font-family:"Manrope",sans-serif;font-weight:800;font-size:15px;
  letter-spacing:.02em;
  color:#0d1830;background:linear-gradient(180deg,#f6dfa8,var(--brass));
  border:0;border-radius:999px;padding:15px 30px;cursor:pointer;
  transition:transform .18s ease,box-shadow .18s ease,filter .18s ease;
  box-shadow:0 10px 24px rgba(224,178,95,.22);
}
.btn:hover{transform:translateY(-2px);filter:brightness(1.06)}
.btn:active{transform:translateY(0)}

/* вопрос */
.meta{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
.count{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.22em;color:var(--brass)}
.bars{display:flex;gap:6px}
.bars span{width:26px;height:3px;border-radius:2px;background:rgba(242,239,231,.20);transition:background .4s}
.bars span.done{background:var(--brass)}

.arch{
  width:min(230px,58vw);aspect-ratio:1/1.12;margin:0 auto 20px;
  border-radius:140px 140px 18px 18px;
  overflow:hidden;position:relative;
  border:1px solid rgba(224,178,95,.5);
  box-shadow:0 18px 40px rgba(0,0,0,.5),inset 0 0 0 4px rgba(9,17,35,.7);
}
.arch img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.02)}
.arch::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(224,178,95,.10),rgba(9,17,35,.35));
  pointer-events:none;
}
.q{
  font-family:"Yeseva One",Georgia,serif;
  font-size:clamp(21px,5.4vw,27px);line-height:1.28;
  margin:0 0 20px;text-align:center;color:var(--pearl);
}
.opts{display:grid;gap:10px}
.opt{
  font-family:"Manrope",sans-serif;font-size:16px;font-weight:600;
  color:var(--pearl);text-align:left;
  background:rgba(242,239,231,.06);
  border:1px solid rgba(242,239,231,.16);
  border-radius:14px;padding:15px 18px;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  transition:background .2s,border-color .2s,transform .12s;
}
.opt::before{
  content:"";width:9px;height:9px;border-radius:50%;flex:none;
  background:rgba(242,239,231,.28);transition:background .2s,box-shadow .2s;
}
.opt:hover:not(:disabled){background:rgba(242,239,231,.11);border-color:rgba(224,178,95,.45);transform:translateX(3px)}
.opt:disabled{cursor:default}
.opt.right{border-color:var(--brass);background:rgba(224,178,95,.16)}
.opt.right::before{background:var(--brass);box-shadow:0 0 12px var(--brass)}
.opt.wrong{opacity:.45;border-color:rgba(201,142,164,.5)}
.opt.wrong::before{background:var(--rose)}
.opt:focus-visible{outline:2px solid var(--brass);outline-offset:3px}

.lbl{display:inline-block}
.lbl.out{animation:vanish .42s ease forwards}
.lbl.in{animation:pop .5s cubic-bezier(.2,1.5,.4,1) both}
@keyframes vanish{to{opacity:0;transform:translateY(-10px) scale(.7) rotate(-8deg);filter:blur(6px)}}
@keyframes pop{
  0%{opacity:0;transform:scale(.4) rotate(9deg)}
  60%{opacity:1;transform:scale(1.22) rotate(-4deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
.opt.gag{border-color:var(--rose);background:rgba(201,142,164,.18);animation:wob .55s ease .35s both}
@keyframes wob{0%,100%{transform:rotate(0)}25%{transform:rotate(-1.6deg)}75%{transform:rotate(1.6deg)}}

/* финал */
.score{
  font-family:"Yeseva One",Georgia,serif;
  font-size:clamp(40px,12vw,66px);margin:0;color:var(--brass);line-height:1
}
.verdict{font-size:16px;line-height:1.6;color:rgba(242,239,231,.85);margin:14px 0 26px}
.center{text-align:center}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>

   q:'Как зовут хозяйку обоих зверей?',
   opts:['Маргарита','Елизавета','Виктория','Анастасия'],
   right:1, gag:'жопа'}
];

let idx=0, hits=0, gagFired=false;
const $=id=>document.getElementById(id);
const panels={intro:$('intro'),quiz:$('quiz'),outro:$('outro')};

function show(name){
  Object.values(panels).forEach(p=>p.classList.remove('on'));
  panels[name].classList.add('on');
}
function setLift(n){
  document.documentElement.style.setProperty('--lift',(n*23)+'deg');
}

function render(){
  const d=DATA[idx];
  $('count').textContent='0'+(idx+1)+' / 03';
  $('photo').src=d.img;
  $('photo').alt='';
  $('qtext').textContent=d.q;
  const box=$('opts');
  box.innerHTML='';
  d.opts.forEach((text,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="lbl">'+text+'</span>';
    b.addEventListener('click',()=>pick(b,i));
    box.appendChild(b);
  });
}

function pick(btn,i){
  const d=DATA[idx];
  const all=[...document.querySelectorAll('.opt')];
  all.forEach(b=>b.disabled=true);
  const ok=(i===d.right);
  if(ok){
    hits++;
    btn.classList.add('right');
    $('b'+idx).classList.add('done');
    setLift(hits);
  }else{
    btn.classList.add('wrong');
    all[d.right].classList.add('right');
  }

  let wait=1100;
  if(ok && d.gag){
    gagFired=true;
    wait=2600;
    const lbl=btn.querySelector('.lbl');
    lbl.classList.add('out');
    setTimeout(()=>{
      lbl.textContent=d.gag;
      lbl.classList.remove('out');
      lbl.classList.add('in');
      btn.classList.remove('right');
      btn.classList.add('gag');
    },430);
  }

  setTimeout(()=>{
    idx++;
    if(idx<DATA.length){render();}
    else{finish();}
  },wait);
}

function finish(){
  $('score').textContent=hits+' / 3';
  const lines={
    0:'Ни одного попадания. Коты обижены, хозяйка молчит.',
    1:'Одно попадание. Мост поднялся на треть — придётся ждать утра.',
    2:'Почти. Один зверь остался неопознанным.',
    3:'Полный разбор: Рика, Мотя и Елизавета.'
  };
  let t=lines[hits];
  if(hits===3 && gagFired) t='Рика опознана, Мотя опознан, а хозяйка — сами видели кто.';
  $('verdict').textContent=t;
  show('outro');
}

$('start').addEventListener('click',()=>{show('quiz');render();});
$('again').addEventListener('click',()=>{
  idx=0;hits=0;gagFired=false;setLift(0);
  ['b0','b1','b2'].forEach(id=>$(id).classList.remove('done'));
  show('quiz');render();
});
</script>
</body>
</html>
